<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomfy</title>
    <meta name="description" content="Discover new music in the most easy way">
</head>
<body>
    <header>Randomfy</header>
    <section>
        <div class="random-song">
            <h1>Song of the day</h1>
            <p id="song-result">Loading...</p>
        </div>
        <div class="random-album">
            <h1>Album of the day</h1>
            <img id="album-cover" src="" alt="">
            <p id="album-result"></p>
        </div>
        <div class="random-genre">
            <h1>Genre of the day</h1>
            <p id="genre-result"></p>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
